<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>SmartPark - Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    body { font-family: 'Inter', sans-serif; background-color: #e7fff3; }
    .font-headline { font-family: 'Manrope', sans-serif; }
  </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6">
  <div class="absolute top-10 right-10 w-64 h-64 bg-emerald-200/30 rounded-full blur-3xl -z-10"></div>
  <div class="absolute bottom-10 left-10 w-48 h-48 bg-green-200/20 rounded-full blur-3xl -z-10"></div>

  <div class="w-full max-w-md">
    <!-- Brand -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 bg-emerald-700 rounded-2xl mb-4">
        <span class="material-symbols-outlined text-white text-3xl" style="font-variation-settings:'FILL' 1">local_parking</span>
      </div>
      <h1 class="font-headline text-3xl font-extrabold text-emerald-900">SmartPark</h1>
      <p class="text-emerald-600 mt-1">Efficient. Sustainable. Simple.</p>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-2xl p-8 shadow-lg border border-emerald-50">
      <h2 class="font-headline text-xl font-bold text-emerald-900 mb-6">Welcome Back</h2>
      <div class="space-y-5">
        <!-- Role selector -->
        <div class="space-y-2">
          <label class="block text-sm font-semibold text-emerald-700">Login As</label>
          <div class="flex gap-3">
            <button id="btnUser" onclick="setRole('user')" class="flex-1 py-2 rounded-xl border-2 border-emerald-600 bg-emerald-600 text-white text-sm font-semibold transition-all">User</button>
            <button id="btnAdmin" onclick="setRole('admin')" class="flex-1 py-2 rounded-xl border-2 border-emerald-200 text-emerald-700 text-sm font-semibold transition-all hover:border-emerald-600">Admin</button>
          </div>
        </div>
        <input type="hidden" id="role" value="user"/>

        <div class="space-y-1">
          <label class="block text-sm font-semibold text-emerald-700">Username</label>
          <div class="relative">
            <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-emerald-400 text-xl">person</span>
            <input type="text" placeholder="Enter username" class="w-full pl-10 pr-4 py-3 bg-emerald-50 border border-emerald-100 rounded-xl text-emerald-900 placeholder:text-emerald-400 focus:outline-none focus:ring-2 focus:ring-emerald-500 transition-all"/>
          </div>
        </div>
        <div class="space-y-1">
          <div class="flex justify-between">
            <label class="text-sm font-semibold text-emerald-700">Password</label>
            <a href="#" class="text-xs font-bold text-emerald-600 hover:underline">Forgot?</a>
          </div>
          <div class="relative">
            <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-emerald-400 text-xl">lock</span>
            <input type="password" placeholder="••••••••" class="w-full pl-10 pr-4 py-3 bg-emerald-50 border border-emerald-100 rounded-xl text-emerald-900 focus:outline-none focus:ring-2 focus:ring-emerald-500 transition-all"/>
          </div>
        </div>
        <button onclick="doLogin()" class="w-full py-4 bg-emerald-700 text-white font-bold rounded-full hover:bg-emerald-800 hover:scale-[1.02] active:scale-95 transition-all flex items-center justify-center gap-2 shadow-lg shadow-emerald-200 mt-2">
          <span>Login</span>
          <span class="material-symbols-outlined text-xl">arrow_forward</span>
        </button>
      </div>
      <div class="mt-6 pt-5 border-t border-emerald-50 text-center text-sm text-emerald-600">
        Don't have an account? <a href="register.html" class="text-emerald-700 font-bold hover:underline">Register Now</a>
      </div>
    </div>
    <p class="text-center mt-6 text-xs text-emerald-500"><a href="index.html" class="hover:underline">← Back to Home</a></p>
  </div>

  <script>
    function setRole(role) {
      document.getElementById('role').value = role;
      document.getElementById('btnUser').className = role === 'user'
        ? 'flex-1 py-2 rounded-xl border-2 border-emerald-600 bg-emerald-600 text-white text-sm font-semibold transition-all'
        : 'flex-1 py-2 rounded-xl border-2 border-emerald-200 text-emerald-700 text-sm font-semibold transition-all hover:border-emerald-600';
      document.getElementById('btnAdmin').className = role === 'admin'
        ? 'flex-1 py-2 rounded-xl border-2 border-emerald-600 bg-emerald-600 text-white text-sm font-semibold transition-all'
        : 'flex-1 py-2 rounded-xl border-2 border-emerald-200 text-emerald-700 text-sm font-semibold transition-all hover:border-emerald-600';
    }
    function doLogin() {
      const role = document.getElementById('role').value;
      window.location.href = role === 'admin' ? 'admin_dashboard.html' : 'dashboard.html';
    }
  </script>
</body>
</html>
