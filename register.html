<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>SmartPark - Register</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    body { font-family: 'Inter', sans-serif; background-color: #e7fff3; }
    .font-headline { font-family: 'Manrope', sans-serif; }
  </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6">
  <div class="absolute top-10 right-10 w-64 h-64 bg-emerald-200/30 rounded-full blur-3xl -z-10"></div>
  <div class="absolute bottom-10 left-10 w-48 h-48 bg-green-200/20 rounded-full blur-3xl -z-10"></div>

  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <a href="index.html" class="font-headline text-2xl font-extrabold text-emerald-800">SmartPark</a>
    </div>
    <div class="bg-white rounded-2xl p-8 shadow-lg border border-emerald-50">
      <h1 class="font-headline text-2xl font-extrabold text-emerald-900 mb-1">Create Account</h1>
      <p class="text-emerald-600 text-sm mb-6">Join the smart parking ecosystem</p>

      <div class="space-y-4">
        <div>
          <label class="block text-xs font-bold uppercase tracking-widest text-emerald-600 mb-1">Full Name</label>
          <div class="relative">
            <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-emerald-400 text-xl">badge</span>
            <input type="text" placeholder="John Doe" class="w-full pl-10 pr-4 py-3 bg-emerald-50 border border-emerald-100 rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-500 transition-all"/>
          </div>
        </div>
        <div>
          <label class="block text-xs font-bold uppercase tracking-widest text-emerald-600 mb-1">Username</label>
          <div class="relative">
            <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-emerald-400 text-xl">person</span>
            <input type="text" placeholder="johndoe" class="w-full pl-10 pr-4 py-3 bg-emerald-50 border border-emerald-100 rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-500 transition-all"/>
          </div>
        </div>
        <div>
          <label class="block text-xs font-bold uppercase tracking-widest text-emerald-600 mb-1">Email</label>
          <div class="relative">
            <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-emerald-400 text-xl">mail</span>
            <input type="email" placeholder="john@email.com" class="w-full pl-10 pr-4 py-3 bg-emerald-50 border border-emerald-100 rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-500 transition-all"/>
          </div>
        </div>
        <div>
          <label class="block text-xs font-bold uppercase tracking-widest text-emerald-600 mb-1">Password</label>
          <div class="relative">
            <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-emerald-400 text-xl">lock</span>
            <input type="password" placeholder="••••••••" class="w-full pl-10 pr-4 py-3 bg-emerald-50 border border-emerald-100 rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-500 transition-all"/>
          </div>
        </div>
        <div class="flex items-start gap-3 pt-1">
          <input type="checkbox" id="terms" class="mt-1 w-4 h-4 rounded accent-emerald-600"/>
          <label for="terms" class="text-xs text-emerald-600">I agree to the <a href="#" class="font-bold text-emerald-700 hover:underline">Terms of Service</a> and <a href="#" class="font-bold text-emerald-700 hover:underline">Privacy Policy</a></label>
        </div>
        <a href="login.html">
          <button class="w-full py-4 bg-emerald-700 text-white font-bold rounded-full hover:bg-emerald-800 hover:scale-[1.02] active:scale-95 transition-all flex items-center justify-center gap-2 shadow-lg shadow-emerald-200 mt-1">
            Create Account
            <span class="material-symbols-outlined text-xl">arrow_forward</span>
          </button>
        </a>
      </div>

      <div class="mt-6 pt-5 border-t border-emerald-50 text-center text-sm text-emerald-600">
        Already have an account? <a href="login.html" class="text-emerald-700 font-bold hover:underline">Login here</a>
      </div>
    </div>
    <p class="text-center mt-6 text-xs text-emerald-500"><a href="index.html" class="hover:underline">← Back to Home</a></p>
  </div>
</body>
</html>
